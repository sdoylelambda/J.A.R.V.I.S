# ---- Personalize ----
personalize:
  ai_assistant_name: "A.T.L.A.S."
  response_name: 'sir' # -- allow use to change to 'ma'am', 'john', 'jane', etc.
  # home_city: "New York"  -- for what's the weather and local based responses

gui:
  # window border
  border_color: "#1a6aff"        # light blue
  border_width: 3
  # title bar / window chrome
  title_color: "#0a1a4a"         # dark blue
  # background
  background_color: "#0a0a0f"
  # text colors
  text_color: "#c8d8e8"
  caption_color: "#8a9ab8"
  heard_color: "#4499ff"
  # button colors
  button_bg: "#1a1a2e"
  button_border: "#2a2a4e"
  button_hover: "#2a2a4e"

# ---- Node identity ----
node:
  name: "g7"
  role: "single_node" # single_node | observer | brain | hands

# ---- Networking (future use) ----
network:
  brain_ip: "127.0.0.1"
  brain_port: 8000
  hands_ip: "127.0.0.1"
  hands_port: 8001
  observer_ip: "127.0.0.1"
  observer_port: 8002

# ---- LLM ----
llm:
  enabled: true
  # local | remote
  backend: "local"

  models:
    classifier:
      name: phi3:mini
      # set for 3 sentence max responses - double if cut off
      num_ctx: 2048
      # deterministic - no creativity needed, just classify
      temperature: 0.0
      # hard output cap - 3 sentence max - increase for longer responses from phi3 (basic AI)
      max_tokens: 300

    orchestrator:
      name: mistral
      # set for shorter commands - double if cut off
      num_ctx: 8092
      # low-medium - consistent JSON output, handles varied phrasing
      temperature: 0.2
      max_tokens: 500

    code:
      # deepseek-r1 - Deep system analysis
      name: deepseek-coder:6.7b
      # longer context for full code output - bump to 8192 if truncating complex outputs
      num_ctx: 8092
      # nearly deterministic - correct code over creative code
      temperature: 0.1

  api_models:
    claude:
      enabled: false
      model: claude-opus-4-6
      max_tokens: 1000
      ask_permission: true
    gemini:
      enabled: true
      # models/gemini-2.5-flash-lite -
      model: gemini-2.5-flash
      ask_permission: true

  # legacy/unused for now
  model_path: "./models/mpt-7b/"
# ---- Integrations ----
integrations:
  google_calendar:
    enabled: true
    credentials_path: "/home/zero/.config/atlas/google_calendar_credentials.json"
    # created on first run. it will be stored here
    token_path: "/home/zero/.config/atlas/google_calendar_token.json"
  gmail:
    enabled: true
    check_interval_minutes: 5
    importance_threshold: 0.7

# ---- Memory ----
memory:
  enabled: true
  wing: atlas
  palace_path: "~/.mempalace/palace"
  auto_store_conversations: true

# ---- Audio ----
audio:
  samplerate: 16000
  # Max length of message that can be heard in seconds
  duration: 30
  mic_index: null
  use_mock: false
  calibration_interval: 30
  # give up waiting to START speaking after 3s
  pre_speech_timeout: 3.0
  # hard cap — allows long commands
  max_speech_duration: 25.0
  # wait 1.5s of silence before stopping mid-speech
  silence_seconds: 1.5

transcription:
  engine: faster-whisper

# ---- Voice ----
tts:
  # mock TTS
  enabled: false
  engine: "coqui"
  voice: "default"

# ---- Speech ----
stt:
  language: en
  # Length of message that can be heard in seconds
  duration: 30
  # tiny | base | small | medium | large
  whisper_model: small
  # tiny | base | small | medium | large
  fw_model: small

# ---- Camera vision ----
vision:
  enabled: true
  camera_index: 0
  model: llava
  max_storage_mb: 250
  resolution_width: 1920
  resolution_height: 1080

# ---- Execution permissions ----
permissions:
  allow_file_write: true
  # safer default
  allow_command_exec: false
  allow_network: false

# ---- Logging ----
logging:
  level: "INFO"
  file: "./logs/jarvis.log"

# ---- Development ----
dev:
  # IMPORTANT: keeps everything lightweight
  mock_mode: true
  auto_approve: false

# ---- Device ----
system:
  cpu_threads: 6
  # For whisper - models auto switch from GPU to CPU
  use_gpu: false

# ---- Browser ----
browser:
  profile: "jarvis"
  chrome_profile_path: "/home/zero/.config/google-chrome/jarvis"
  use_chrome: false
  firefox_profile_path: "/home/zero/.mozilla/firefox/jarvis"
  use_firefox: true