# ---- Node identity ----
node:
  name: "g7"
  role: "single_node" # single_node | observer | brain | hands

# ---- Networking (future use) ----
network:
  brain_ip: "127.0.0.1"
  brain_port: 8000
  hands_ip: "127.0.0.1"
  hands_port: 8001
  observer_ip: "127.0.0.1"
  observer_port: 8002

# ---- LLM (disabled for now) ----
llm:
  enabled: true
  backend: "local"  # local | remote

  models:
    orchestrator:
      name: mistral
      num_ctx: 512  # set for short commands - double if cut off
      temperature: 0.7  # high risk - assumes it knows
    classifier:
      name: phi3:mini
      num_ctx: 512  # set for short commands - double if cut off
      temperature: 0.1  # low risk - nearly no assumptions
    code:
      name: deepseek-coder:6.7b
      num_ctx: 2048  # set for long commands. try 1-24 if too slow - may cut off long commands
      temperature: 0.1  # low risk - nearly no assumptions

  api_models:
    claude:
      enabled: false
      model: claude-opus-4-6
      max_tokens: 1000
      ask_permission: true
    gemini:
      enabled: false
      model: gemini-pro
      ask_permission: true

  # legacy/unused for now
  model_path: "./models/mpt-7b/"

# ---- Memory ----
memory:
  enabled: false # enable later when adding FAISS
  vector_db_path: "./memory/vector_db/"
  short_term_db: "./memory/short_term.db"
  recall_top_k: 5

# ---- Audio ----
audio:
  samplerate: 16000
  duration: 15          # Length of message that can be heard
  mic_index: null
  use_mock: false

transcription:
  engine: faster-whisper

  tts:
    enabled: false # mock TTS for now
    engine: "coqui"
    voice: "default"

# ---- Execution permissions ----
permissions:
  allow_file_write: true
  allow_command_exec: false # safer default
  allow_network: false

# ---- Logging ----
logging:
  level: "INFO"
  file: "./logs/jarvis.log"

# ---- Development ----
dev:
  mock_mode: true # IMPORTANT: keeps everything lightweight
  auto_approve: false

stt:
  backend: faster_whisper   # faster_whisper | whisper
  model: small              # tiny | base | small | medium
  language: en
  duration: 15              # Length of message that can be heard

system:
  cpu_threads: 1
  use_gpu: false