# ---- Node identity ----
node:
  name: "g7"
  role: "single_node" # single_node | observer | brain | hands

# ---- Networking (future use) ----
network:
  brain_ip: "127.0.0.1"
  brain_port: 8000
  hands_ip: "127.0.0.1"
  hands_port: 8001
  observer_ip: "127.0.0.1"
  observer_port: 8002

# ---- LLM (disabled for now) ----
llm:
  enabled: true
  # local | remote
  backend: "local"

  models:
    orchestrator:
      name: mistral
      # set for shorter commands - double if cut off
      num_ctx: 2048
      # low-medium - consistent JSON output, handles varied phrasing
      temperature: 0.2
    classifier:
      name: phi3:mini
      # set for short commands - double if cut off
      num_ctx: 512
      # deterministic - no creativity needed, just classify
      temperature: 0.0
      # hard output cap - one sentence max - increase for longer responses from phi3 (basic AI)
      max_tokens: 50
    code:
      name: deepseek-coder:6.7b
      # longer context for full code output
      num_ctx: 2048
      # nearly deterministic - correct code over creative code
      temperature: 0.1

  api_models:
    claude:
      enabled: false
      model: claude-opus-4-6
      max_tokens: 1000
      ask_permission: true
    gemini:
      enabled: false
      model: gemini-pro
      ask_permission: true

  # legacy/unused for now
  model_path: "./models/mpt-7b/"

# ---- Memory ----
memory:
  enabled: false # enable later when adding FAISS
  vector_db_path: "./memory/vector_db/"
  short_term_db: "./memory/short_term.db"
  recall_top_k: 5

# ---- Audio ----
audio:
  samplerate: 16000
  # Max length of message that can be heard in seconds
  duration: 30
  mic_index: null
  use_mock: false
  calibration_interval: 30
  # give up waiting to START speaking after 3s
  pre_speech_timeout: 3.0
  # hard cap — allows long commands
  max_speech_duration: 25.0
  # wait 1.5s of silence before stopping mid-speech
  silence_seconds: 1.5

transcription:
  engine: faster-whisper

  tts:
    # mock TTS for now
    enabled: false
    engine: "coqui"
    voice: "default"

# ---- Execution permissions ----
permissions:
  allow_file_write: true
  # safer default
  allow_command_exec: false
  allow_network: false

# ---- Logging ----
logging:
  level: "INFO"
  file: "./logs/jarvis.log"

# ---- Development ----
dev:
  # IMPORTANT: keeps everything lightweight
  mock_mode: true
  auto_approve: false

stt:
  # faster_whisper | whisper both used depending on message length - do not change
  backend: faster_whisper
  # tiny | base | small | medium
  model: small
  language: en
  # Length of message that can be heard in seconds
  duration: 30

system:
  cpu_threads: 1
  use_gpu: false